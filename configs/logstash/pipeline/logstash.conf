input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  # ============================================
  # Parse JSON logs (API logs from Pino/Winston)
  # ============================================
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
    
    # Extract fields from parsed JSON with proper type conversion
    if [parsed][level] {
      # Pino uses numeric levels (30=info, 40=warn, 50=error, 60=fatal)
      if [parsed][level] =~ /^[0-9]+$/ {
        mutate {
          add_field => { "level_number" => "%{[parsed][level]}" }
        }
        # Convert Pino numeric levels to string
        if [parsed][level] == "60" {
          mutate { add_field => { "log_level" => "fatal" } }
        } else if [parsed][level] == "50" {
          mutate { add_field => { "log_level" => "error" } }
        } else if [parsed][level] == "40" {
          mutate { add_field => { "log_level" => "warn" } }
        } else if [parsed][level] == "30" {
          mutate { add_field => { "log_level" => "info" } }
        } else if [parsed][level] == "20" {
          mutate { add_field => { "log_level" => "debug" } }
        } else if [parsed][level] == "10" {
          mutate { add_field => { "log_level" => "trace" } }
        }
      } else {
        # String level (Winston, Bunyan)
        mutate { add_field => { "log_level" => "%{[parsed][level]}" } }
      }
    }

    if [parsed][time] {
      mutate { add_field => { "log_timestamp" => "%{[parsed][time]}" } }
    }

    if [parsed][timestamp] {
      mutate { add_field => { "log_timestamp" => "%{[parsed][timestamp]}" } }
    }

    if [parsed][service] {
      mutate { add_field => { "service_name" => "%{[parsed][service]}" } }
    }

    if [parsed][msg] {
      mutate { add_field => { "log_message" => "%{[parsed][msg]}" } }
    }

    if [parsed][message] and ![parsed][msg] {
      mutate { add_field => { "log_message" => "%{[parsed][message]}" } }
    }

    if [parsed][err] and [parsed][err][message] {
      mutate { add_field => { "error_message" => "%{[parsed][err][message]}" } }
    }

    if [parsed][err] and [parsed][err][stack] {
      mutate { add_field => { "error_stack" => "%{[parsed][err][stack]}" } }
    }

    if [parsed][stack] {
      mutate { add_field => { "error_stack" => "%{[parsed][stack]}" } }
    }

    if [parsed][requestId] or [parsed][reqId] {
      if [parsed][requestId] {
        mutate { add_field => { "request_id" => "%{[parsed][requestId]}" } }
      } else if [parsed][reqId] {
        mutate { add_field => { "request_id" => "%{[parsed][reqId]}" } }
      }
    }

    if [parsed][userId] {
      mutate { add_field => { "user_id" => "%{[parsed][userId]}" } }
    }

    if [parsed][method] or [parsed][req] and [parsed][req][method] {
      if [parsed][method] {
        mutate { add_field => { "http_method" => "%{[parsed][method]}" } }
      } else if [parsed][req][method] {
        mutate { add_field => { "http_method" => "%{[parsed][req][method]}" } }
      }
    }

    if [parsed][url] {
      mutate { add_field => { "http_url" => "%{[parsed][url]}" } }
    }

    if [parsed][req] and [parsed][req][url] {
      mutate { add_field => { "http_url" => "%{[parsed][req][url]}" } }
    }

    if [parsed][statusCode] {
      mutate { 
        add_field => { "http_status_code" => "%{[parsed][statusCode]}" }
      }
      mutate {
        convert => { "http_status_code" => "integer" }
      }
    }

    if [parsed][res] and [parsed][res][statusCode] {
      mutate { 
        add_field => { "http_status_code" => "%{[parsed][res][statusCode]}" }
      }
      mutate {
        convert => { "http_status_code" => "integer" }
      }
    }

    if [parsed][responseTime] {
      mutate { 
        add_field => { "response_time_ms" => "%{[parsed][responseTime]}" }
      }
      mutate {
        convert => { "response_time_ms" => "float" }
      }
    }

    if [parsed][duration] {
      mutate { 
        add_field => { "response_time_ms" => "%{[parsed][duration]}" }
      }
      mutate {
        convert => { "response_time_ms" => "float" }
      }
    }

    # Add tag for JSON logs
    mutate {
      add_tag => ["json", "application"]
    }
  }

  # ============================================
  # Parse Nginx Access Logs (Combined format)
  # ============================================
  else if [service] == "travelnest-nginx" and [log_type] == "access" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{USER:remote_user} \[%{HTTPDATE:nginx_timestamp}\] "%{WORD:http_method} %{URIPATHPARAM:http_url} HTTP/%{NUMBER:http_version}" %{INT:http_status_code} %{INT:body_bytes_sent} "%{DATA:http_referer}" "%{DATA:http_user_agent}"'
      }
      tag_on_failure => ["_grokparsefailure_nginx_access"]
    }
    
    if ![_grokparsefailure_nginx_access] {
      mutate {
        convert => {
          "http_status_code" => "integer"
          "body_bytes_sent" => "integer"
        }
        add_tag => ["nginx", "access"]
      }
      
      # Parse nginx timestamp
      date {
        match => ["nginx_timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
        target => "@timestamp"
        timezone => "UTC"
      }
    }
  }

  # ============================================
  # Parse Nginx Error Logs
  # ============================================
  else if [service] == "travelnest-nginx" and [log_type] == "error" {
    grok {
      match => {
        "message" => '%{TIMESTAMP_ISO8601:nginx_timestamp} \[%{LOGLEVEL:log_level}\] %{POSINT:pid}#%{NUMBER:tid}: (\*%{NUMBER:connection_id} )?%{GREEDYDATA:error_message}'
      }
      tag_on_failure => ["_grokparsefailure_nginx_error"]
    }
    
    if ![_grokparsefailure_nginx_error] {
      mutate {
        convert => {
          "pid" => "integer"
          "connection_id" => "integer"
        }
        add_tag => ["nginx", "error"]
      }
      
      # Parse nginx error timestamp (format: 2026/03/10 14:30:00)
      date {
        match => ["nginx_timestamp", "yyyy/MM/dd HH:mm:ss"]
        target => "@timestamp"
        timezone => "UTC"
      }
    }
  }

  # ============================================
  # Fallback: Generic log parsing
  # ============================================
  else {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \\[%{LOGLEVEL:log_level}\\] %{GREEDYDATA:log_message}" 
      }
      tag_on_failure => ["_grokparsefailure_generic"]
    }
    
    mutate {
      add_tag => ["generic"]
    }
  }

  # ============================================
  # Parse timestamp with multiple formats
  # ============================================
  if [log_timestamp] {
    date {
      match => [
        "log_timestamp",
        "ISO8601",
        "yyyy-MM-dd HH:mm:ss",
        "yyyy-MM-dd'T'HH:mm:ss.SSSZ",
        "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'",
        "UNIX_MS"
      ]
      target => "@timestamp"
      tag_on_failure => ["_dateparsefailure"]
    }
  }

  # ============================================
  # Classify error severity
  # ============================================
  if [log_level] == "error" or [log_level] == "fatal" {
    mutate {
      add_tag => ["error", "high_priority"]
      add_field => { "severity" => "high" }
    }
  } else if [log_level] == "warn" or [log_level] == "warning" {
    mutate {
      add_tag => ["warning"]
      add_field => { "severity" => "medium" }
    }
  } else if [log_level] == "info" {
    mutate {
      add_field => { "severity" => "low" }
    }
  } else if [log_level] == "debug" or [log_level] == "trace" {
    mutate {
      add_field => { "severity" => "info" }
    }
  } else {
    mutate {
      add_field => { "severity" => "unknown" }
    }
  }

  # ============================================
  # HTTP Status Code Classification
  # ============================================
  if [http_status_code] {
    if [http_status_code] >= 500 {
      mutate { add_tag => ["http_5xx", "server_error"] }
    } else if [http_status_code] >= 400 {
      mutate { add_tag => ["http_4xx", "client_error"] }
    } else if [http_status_code] >= 300 {
      mutate { add_tag => ["http_3xx", "redirect"] }
    } else if [http_status_code] >= 200 {
      mutate { add_tag => ["http_2xx", "success"] }
    }
  }

  # ============================================
  # Add hostname (with fallback)
  # ============================================
  if [host][name] {
    mutate { add_field => { "hostname" => "%{[host][name]}" } }
  } else if [beat][hostname] {
    mutate { add_field => { "hostname" => "%{[beat][hostname]}" } }
  }

  # ============================================
  # Normalize field names for consistency
  # ============================================
  # Ensure we have consistent field names regardless of source
  if [http_method] and ![method] {
    mutate { copy => { "http_method" => "method" } }
  }

  if [http_url] and ![url] {
    mutate { copy => { "http_url" => "url" } }
  }

  if [http_status_code] and ![statusCode] {
    mutate { copy => { "http_status_code" => "statusCode" } }
  }

  if [response_time_ms] and ![responseTime] {
    mutate { copy => { "response_time_ms" => "responseTime" } }
  }

  # ============================================
  # GeoIP enrichment for client IPs
  # ============================================
  if [client_ip] and [client_ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)/ {
    geoip {
      source => "client_ip"
      target => "geoip"
      fields => ["city_name", "country_name", "location", "region_name"]
    }
  }

  # ============================================
  # Remove unnecessary/temporary fields
  # ============================================
  mutate {
    remove_field => [
      "parsed",
      "agent",
      "ecs",
      "input",
      "log",
      "log_timestamp",
      "nginx_timestamp",
      "level_number"
    ]
  }

  # ============================================
  # Remove fields with failure tags to reduce noise
  # ============================================
  if "_grokparsefailure" in [tags] or "_dateparsefailure" in [tags] {
    mutate {
      remove_tag => ["beats_input_codec_plain_applied"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user => "${ELASTICSEARCH_USERNAME:elastic}"
    password => "${ELASTICSEARCH_PASSWORD}"
    # Use ILM-managed alias instead of date-based index
    index => "travelnest-logs"
    # ILM settings
    ilm_enabled => true
    ilm_rollover_alias => "travelnest-logs"
    ilm_pattern => "000001"
    ilm_policy => "travelnest-logs-policy"
  }
}
