filebeat.inputs:
  # Application logs
  - type: log
    enabled: true
    paths:
      - /logs/*.log
      - /logs/**/*.log
    fields:
      service: travelnest-server
      environment: production
    fields_under_root: true
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message
    multiline.pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}'
    multiline.negate: true
    multiline.match: after

  # Error logs
  - type: log
    enabled: true
    paths:
      - /logs/error.log
    fields:
      service: travelnest-server
      log_type: error
      environment: production
    fields_under_root: true

  # Access logs
  - type: log
    enabled: true
    paths:
      - /logs/access.log
    fields:
      service: travelnest-server
      log_type: access
      environment: production
    fields_under_root: true

  # Docker container logs
  - type: container
    enabled: true
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      - add_docker_metadata:
          host: 'unix:///var/run/docker.sock'

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~

# General
name: travelnest-filebeat
tags: ['travelnest', 'production', 'nodejs']

# Output to Logstash
output.logstash:
  hosts: ['logstash:5044']
  compression_level: 3
  worker: 2
  bulk_max_size: 2048

# Kibana
setup.kibana:
  host: 'kibana:5601'

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# Monitoring
monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ['elasticsearch:9200']
  username: '${ELASTICSEARCH_USERNAME:elastic}'
  password: '${ELASTICSEARCH_PASSWORD}'
